/* ── GOOGLE SHEETS READER ──────────────────────────────── */
async function fetchSheetData(sheetId, sheetName='📊 Master Data') {
  // Uses the public CSV export — no API key needed, sheet must be shared as "anyone with link can view"
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Could not fetch sheet. Make sure it is shared publicly (anyone with link can view).');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim().replace(/^"|"$/g,'')] = (vals[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  }).filter(r => r['Market'] && ['Spain','Italy','France'].includes(r['Market']));
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

/* ── DATA AGGREGATION ──────────────────────────────────── */
function aggregateData(rows, market, year, week) {
  const filtered = rows.filter(r => {
    if (r['Source Flow'] !== 'SEO/Whale') return false;
    if (market !== 'All' && r['Market'] !== market) return false;
    if (String(r['Year']) !== String(year)) return false;
    if (week !== 'All' && String(r['Week']) !== String(week)) return false;
    return true;
  });

  const prevFiltered = rows.filter(r => {
    if (r['Source Flow'] !== 'SEO/Whale') return false;
    if (market !== 'All' && r['Market'] !== market) return false;
    if (String(r['Year']) !== String(year)) return false;
    if (week !== 'All' && String(r['Week']) !== String(Number(week)-1)) return false;
    return true;
  });

  const bl = filtered.length;
  const rp = new Set(filtered.map(r=>r['Article URL'])).size;
  const newRd = filtered.filter(r=>r['New RD']==='Yes').length;
  const drVals = filtered.map(r=>parseFloat(r['DR'])).filter(x=>!isNaN(x)&&x>0);
  const avgDr = drVals.length ? (drVals.reduce((a,b)=>a+b,0)/drVals.length).toFixed(1) : '—';
  const blPrev = prevFiltered.length;
  const rpPrev = new Set(prevFiltered.map(r=>r['Article URL'])).size;

  // Campaigns
  const campMap = {};
  filtered.forEach(r => {
    const k = r['Campaign Name'] || '—';
    if (!campMap[k]) campMap[k] = {bl:0,rp:new Set(),dr:[],newRd:0};
    campMap[k].bl++;
    campMap[k].rp.add(r['Article URL']);
    const dr = parseFloat(r['DR']);
    if (!isNaN(dr)&&dr>0) campMap[k].dr.push(dr);
    if (r['New RD']==='Yes') campMap[k].newRd++;
  });
  const campaigns = Object.entries(campMap).map(([name,d])=>({
    name, bl:d.bl, rp:d.rp.size,
    avgDr: d.dr.length ? +(d.dr.reduce((a,b)=>a+b,0)/d.dr.length).toFixed(1) : 0,
    newRd:d.newRd
  })).sort((a,b)=>b.bl-a.bl);

  // Topics
  const topicMap = {};
  filtered.forEach(r => {
    const t = r['Campaign Topic'] || '—';
    if (!topicMap[t]) topicMap[t] = {bl:0,dr:[]};
    topicMap[t].bl++;
    const dr = parseFloat(r['DR']);
    if (!isNaN(dr)&&dr>0) topicMap[t].dr.push(dr);
  });
  const topics = Object.entries(topicMap).map(([name,d])=>({
    name, bl:d.bl,
    avgDr: d.dr.length ? +(d.dr.reduce((a,b)=>a+b,0)/d.dr.length).toFixed(1) : 0
  })).sort((a,b)=>b.bl-a.bl);

  // Best link
  const sortedByDr = [...filtered].sort((a,b)=>(parseFloat(b['DR'])||0)-(parseFloat(a['DR'])||0));
  const best = sortedByDr[0];

  // Weekly trend
  const allWeeks = [...new Set(rows.filter(r=>{
    if (r['Source Flow']!=='SEO/Whale') return false;
    if (market!=='All'&&r['Market']!==market) return false;
    if (String(r['Year'])!==String(year)) return false;
    return true;
  }).map(r=>Number(r['Week'])))].sort((a,b)=>a-b);

  const trendData = allWeeks.map(w => {
    const wRows = rows.filter(r=>r['Source Flow']==='SEO/Whale'&&
      (market==='All'||r['Market']===market)&&
      String(r['Year'])===String(year)&&String(r['Week'])===String(w));
    return { week:w, bl:wRows.length, rp:new Set(wRows.map(r=>r['Article URL'])).size,
      avgDr: (() => { const v=wRows.map(r=>parseFloat(r['DR'])).filter(x=>!isNaN(x)&&x>0); return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):0; })()
    };
  });

  return { bl, rp, newRd, avgDr, blPrev, rpPrev, campaigns, topics, best, trendData };
}

function getAvailableOptions(rows) {
  const markets = [...new Set(rows.map(r=>r['Market']).filter(Boolean))].sort();
  const years = [...new Set(rows.map(r=>r['Year']).filter(Boolean).map(Number).filter(y=>y>2000))].sort((a,b)=>b-a);
  return { markets, years };
}

function getWeeksForYear(rows, market, year) {
  return [...new Set(rows.filter(r=>
    r['Source Flow']==='SEO/Whale'&&
    (market==='All'||r['Market']===market)&&
    String(r['Year'])===String(year)
  ).map(r=>Number(r['Week'])).filter(w=>w>0))].sort((a,b)=>a-b);
}

/* ── KPI CARD ──────────────────────────────────────────── */
function KpiCard({label, value, prev, suffix='', color='var(--ppn)'}) {
  let delta = null;
  if (prev !== undefined && prev !== null && prev > 0) {
    const d = value - prev;
    const pct = Math.round((d/prev)*100);
    delta = { val: pct, up: d >= 0 };
  }
  return (
    <div style={{background:'#fff',borderRadius:'var(--r-ppn)',padding:'20px 24px',border:'1px solid var(--border)',minWidth:0}}>
      <div style={{fontSize:12,color:'var(--muted)',fontWeight:500,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</div>
      <div style={{fontSize:32,fontWeight:700,color:'var(--text)',lineHeight:1}}>{value}{suffix}</div>
      {delta && (
        <div style={{fontSize:12,marginTop:6,color:delta.up?'var(--green)':'var(--red)',fontWeight:500}}>
          {delta.up?'↑':'↓'} {Math.abs(delta.val)}% vs prev week
        </div>
      )}
      {!delta && prev !== undefined && (
        <div style={{fontSize:12,marginTop:6,color:'var(--muted)'}}>prev: {prev}</div>
      )}
    </div>
  );
}

/* ── TREND CHART ───────────────────────────────────────── */
function TrendChart({data, activeWeek}) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if (!data.length||!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = data.map(d=>`W${d.week}`);
    const blData = data.map(d=>d.bl);
    const rpData = data.map(d=>d.rp);
    const bg = data.map(d=>String(d.week)===String(activeWeek)?'rgba(90,82,255,0.15)':'transparent');
    chartRef.current = new Chart(ref.current, {
      type:'bar',
      data:{ labels, datasets:[
        {type:'bar',label:'Backlinks',data:blData,backgroundColor:'rgba(90,82,255,0.15)',borderColor:'#5A52FF',borderWidth:1.5,yAxisID:'y',order:2},
        {type:'line',label:'Avg DR',data:data.map(d=>d.avgDr),borderColor:'#0FC4B2',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:'#0FC4B2',yAxisID:'y2',tension:0.3,order:1},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{
          y:{position:'left',beginAtZero:true,grid:{color:'#F0F0F5'},ticks:{color:'#63697F',font:{size:11}}},
          y2:{position:'right',beginAtZero:true,grid:{display:false},ticks:{color:'#0FC4B2',font:{size:11}}},
          x:{grid:{display:false},ticks:{color:'#63697F',font:{size:11},maxRotation:0}}
        }
      }
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[data,activeWeek]);
  return <canvas ref={ref} role="img" aria-label="Weekly BL and DR trend"/>;
}

/* ── DR DISTRIBUTION ───────────────────────────────────── */
function DrBuckets({campaigns}) {
  const buckets = [{label:'DR 0–20',min:0,max:20},{label:'DR 21–40',min:21,max:40},{label:'DR 41–60',min:41,max:60},{label:'DR 61–80',min:61,max:80},{label:'DR 81+',min:81,max:999}];
  const counts = buckets.map(b=>campaigns.filter(c=>c.avgDr>=b.min&&c.avgDr<=b.max).reduce((s,c)=>s+c.bl,0));
  const max = Math.max(...counts,1);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:10,padding:'4px 0'}}>
      {buckets.map((b,i)=>(
        <div key={b.label} style={{display:'grid',gridTemplateColumns:'80px 1fr 36px',alignItems:'center',gap:10}}>
          <span style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>{b.label}</span>
          <div style={{height:8,background:'#F0F0F5',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(counts[i]/max)*100}%`,background:'#5A52FF',borderRadius:4,transition:'width 0.4s ease'}}/>
          </div>
          <span style={{fontSize:12,fontWeight:600,textAlign:'right'}}>{counts[i]}</span>
        </div>
      ))}
    </div>
  );
}

            {cols.map(c=>(

/* ── CONNECT MODAL ─────────────────────────────────────── */
function ConnectModal({onConnect}) {
  const [sheetId,setSheetId] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);

  function extractId(val) {
    const m = val.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : val.trim();
  }

  async function handleConnect() {
    const id = extractId(sheetId);
    if (!id) { setErr('Please enter a valid Google Sheets URL or ID.'); return; }
    setLoading(true); setErr('');
    try {
      const rows = await fetchSheetData(id);
      if (!rows.length) throw new Error('Sheet is empty or column headers do not match.');
      onConnect(id, rows);
    } catch(e) {
      setErr(e.message || 'Could not connect. Make sure the sheet is shared as "Anyone with the link can view".');
    } finally { setLoading(false); }
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:24}}>
      <div style={{background:'#fff',borderRadius:'var(--r-ppn)',border:'1px solid var(--border)',padding:'48px',maxWidth:520,width:'100%',boxShadow:'0 4px 40px rgba(90,82,255,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:32}}>
          <Logo size={36}/>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>Growth SEO</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>Off-page performance dashboard</div>
          </div>
        </div>

        <div style={{marginBottom:24}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>Connect your Google Sheet</div>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6,marginBottom:16}}>
            Paste the URL or ID of your Growth SEO Dashboard Google Sheet.<br/>
            The sheet must be shared as <strong style={{color:'var(--text)'}}>Anyone with the link can view</strong> — no API key needed.
          </div>
          <input
            type="text"
            placeholder="https://docs.google.com/spreadsheets/d/..."
            value={sheetId}
            onChange={e=>setSheetId(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleConnect()}
            style={{width:'100%',padding:'12px 16px',borderRadius:'var(--r)',border:'1px solid var(--border)',fontSize:13,outline:'none',color:'var(--text)',marginBottom:12,transition:'border-color 0.2s'}}
            onFocus={e=>e.target.style.borderColor='var(--ppn)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          {err && <div style={{fontSize:12,color:'var(--red)',marginBottom:12,padding:'10px 14px',background:'var(--red-light)',borderRadius:6}}>{err}</div>}
          <button
            onClick={handleConnect}
            disabled={loading}
            style={{width:'100%',padding:'13px',background:'var(--ppn)',color:'#fff',borderRadius:'var(--r-ppn)',fontSize:14,fontWeight:600,opacity:loading?0.7:1,transition:'opacity 0.2s'}}>
            {loading ? 'Connecting…' : 'Connect Sheet'}
          </button>
        </div>

        <div style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:12,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>How to share your sheet</div>
          {['Open your Google Sheet','Click Share (top right)','Change access to "Anyone with the link"','Set permission to "Viewer"','Copy the link and paste it above'].map((s,i)=>(
            <div key={i} style={{display:'flex',gap:10,marginBottom:8,alignItems:'flex-start'}}>
              <div style={{width:20,height:20,borderRadius:'50%',background:'var(--ppn-light)',color:'var(--ppn)',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{i+1}</div>
              <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>{s}</div>
            </div>
          ))}
        </div>

        <button
          onClick={()=>onConnect('DEMO',null)}
          style={{marginTop:20,width:'100%',padding:'11px',background:'transparent',color:'var(--ppn)',border:'1px solid var(--ppn-mid)',borderRadius:'var(--r-ppn)',fontSize:13,fontWeight:500}}>
          Try with demo data instead
        </button>
      </div>
    </div>
  );
}

            id++;
            const domain = domains[Math.floor(Math.random()*domains.length)];
            const rdKey = mkt+'|'+domain;
            const isNew = !seenRD.has(rdKey);
            seenRD.add(rdKey);
            rows.push({
              'Date': `${String(Math.floor(Math.random()*28)+1).padStart(2,'0')}/01/${year}`,
              'Market': mkt,
              'Source Flow': 'SEO/Whale',
              'Project Type': 'Whale',
              'Campaign Topic': topics[Math.floor(Math.random()*topics.length)],
              'Campaign Name': camp,
              'Article URL': `https://${domain}/article-${id}`,
              'DR': String(Math.floor(Math.random()*70)+5),
              'Backlink URL': `https://www.papernest.${mkt==='Spain'?'es':mkt==='Italy'?'it':'fr'}/page-${id}`,
              'Referring Domain': domain,
              'Dest. Domain': `papernest.${mkt==='Spain'?'es':mkt==='Italy'?'it':'fr'}`,
              'New RD': isNew?'Yes':'No',
              'Link Type': 'Backlink',
              'Week': String(week),
              'Year': String(year),
              'WeekYear': `${week} ${year}`,
            });
          }
        });
      }
    }
  }
  return rows;
}

/* ── MAIN APP ──────────────────────────────────────────── */
function App() {
  const [connected, setConnected] = useState(false);
  const [sheetId, setSheetId] = useState('');
  const [allRows, setAllRows] = useState([]);
  const [market, setMarket] = useState('Spain');
  const [year, setYear] = useState(2025);
  const [week, setWeek] = useState('All');
  const [tab, setTab] = useState('overview');

  function handleConnect(id, rows) {
    if (id === 'DEMO') {
      setAllRows(buildDemoRows());
    } else {
      setSheetId(id);
      setAllRows(rows);
    }
    setConnected(true);
  }

  const { markets, years } = useMemo(()=>allRows.length?getAvailableOptions(allRows):{markets:['Spain','Italy','France'],years:[2025]}, [allRows]);
  const weeks = useMemo(()=>allRows.length?getWeeksForYear(allRows,market,year):[], [allRows,market,year]);
  const data = useMemo(()=>allRows.length?aggregateData(allRows,market,year,week):{bl:0,rp:0,newRd:0,avgDr:'—',blPrev:0,rpPrev:0,campaigns:[],topics:[],best:null,trendData:[]}, [allRows,market,year,week]);

  useEffect(()=>{
    if (weeks.length && !weeks.includes(Number(week)) && week!=='All') {
      setWeek(weeks[weeks.length-1]);
    }
  },[weeks]);

  useEffect(()=>{
    if (years.length && !years.includes(year)) setYear(years[0]);
  },[years]);

  if (!connected) return <ConnectModal onConnect={handleConnect}/>;

  const selStyle = {padding:'8px 14px',borderRadius:'var(--r)',border:'1px solid var(--border)',fontSize:13,fontWeight:500,background:'#fff',color:'var(--text)',outline:'none',cursor:'pointer'};
  const tabStyle = (active) => ({padding:'8px 18px',borderRadius:'var(--r)',border:'none',background:active?'var(--ppn)':'transparent',color:active?'#fff':'var(--muted)',fontWeight:active?600:500,fontSize:13,cursor:'pointer',transition:'all 0.15s'});

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* HEADER */}
      <div style={{background:'#fff',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:60}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Logo size={28}/>
            <span style={{fontWeight:700,fontSize:16}}>Growth SEO</span>
            <span style={{color:'var(--muted)',fontSize:13,marginLeft:4}}>Whale Dashboard</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <select value={market} onChange={e=>{setMarket(e.target.value);setWeek('All');}} style={selStyle}>
              {markets.map(m=><option key={m}>{m}</option>)}
            </select>
            <select value={year} onChange={e=>{setYear(Number(e.target.value));setWeek('All');}} style={selStyle}>
              {years.map(y=><option key={y}>{y}</option>)}
            </select>
            <select value={week} onChange={e=>setWeek(e.target.value==='All'?'All':Number(e.target.value))} style={selStyle}>
              <option value="All">All weeks</option>
              {weeks.map(w=><option key={w} value={w}>W {w}</option>)}
            </select>
            <button onClick={()=>{setConnected(false);setAllRows([]);}} style={{...selStyle,color:'var(--muted)',fontSize:12}}>
              ⇄ Change sheet
            </button>
          </div>
        </div>
      </div>

      {/* NAV TABS */}
      <div style={{background:'#fff',borderBottom:'1px solid var(--border)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',gap:4,height:44,alignItems:'center'}}>
          {[['overview','Overview'],['campaigns','Campaigns'],['topics','Topics'],['trend','Trend']].map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)} style={tabStyle(tab===key)}>{label}</button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1280,margin:'0 auto',padding:'28px 24px'}}>

        {/* KPI ROW */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:28}}>
          <KpiCard label="Backlinks" value={data.bl} prev={week!=='All'?data.blPrev:undefined}/>
          <KpiCard label="Published articles" value={data.rp} prev={week!=='All'?data.rpPrev:undefined}/>
          <KpiCard label="Avg DR" value={data.avgDr}/>
          <KpiCard label="New RD" value={data.newRd}/>
          <KpiCard label="Campaigns" value={data.campaigns.length}/>
        </div>

        {/* BEST LINK */}
        {data.best && (
          <div style={{background:'#fff',borderRadius:'var(--r-ppn)',border:'1px solid var(--border)',padding:'20px 24px',marginBottom:28,display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:'var(--ppn-light)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5A52FF" strokeWidth="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Best link of the period</div>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text)',wordBreak:'break-all'}}>{data.best['Referring Domain'] || data.best['Article URL']}</div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Campaign: {data.best['Campaign Name']} · {data.best['Market']}</div>
            </div>
            <div style={{textAlign:'center',flexShrink:0}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>DR</div>
              <div style={{fontSize:36,fontWeight:700,color:'var(--ppn)',lineHeight:1}}>{data.best['DR']}</div>
            </div>
          </div>
        )}

        {/* OVERVIEW TAB */}
        {tab==='overview' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <ChartBox title="BL trend · all weeks" height={240}>
              <TrendChart data={data.trendData} activeWeek={week}/>
            </ChartBox>
            <ChartBox title="BL by topic" height={240}>
              <TopicChart topics={data.topics}/>
            </ChartBox>
            <ChartBox title="DR distribution" height={200}>
              <DrBuckets campaigns={data.campaigns}/>
            </ChartBox>
            <ChartBox title="Top campaigns · BL" height={200}>
              <CampBLChart campaigns={data.campaigns}/>
            </ChartBox>
          </div>
        )}

        {/* CAMPAIGNS TAB */}
        {tab==='campaigns' && (
          <div style={{background:'#fff',borderRadius:'var(--r-ppn)',border:'1px solid var(--border)',overflow:'hidden'}}>
            <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:600}}>{data.campaigns.length} campaigns</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>Click column headers to sort</div>
            </div>
            <CampaignTable campaigns={data.campaigns}/>
          </div>
        )}

        {/* TOPICS TAB */}
        {tab==='topics' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <ChartBox title="BL by topic" height={320}>
              <TopicChart topics={data.topics}/>
            </ChartBox>
            <div style={{background:'#fff',borderRadius:'var(--r-ppn)',border:'1px solid var(--border)',padding:'20px 24px'}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--muted)',marginBottom:16,textTransform:'uppercase',letterSpacing:'0.05em'}}>Topic breakdown</div>
              {data.topics.map((t,i)=>(
                <div key={t.name} style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:500}}>{t.name}</div>
                    <div style={{height:5,background:'#F0F0F5',borderRadius:3,marginTop:4,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${(t.bl/Math.max(...data.topics.map(x=>x.bl),1))*100}%`,background:'var(--ppn)',borderRadius:3}}/>
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--ppn)',textAlign:'right',minWidth:28}}>{t.bl}</div>
                  <div style={{fontSize:12,color:'var(--muted)',minWidth:40,textAlign:'right'}}>{t.avgDr} DR</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TREND TAB */}
        {tab==='trend' && (
          <div style={{display:'grid',gap:16}}>
            <ChartBox title="BL + avg DR · all weeks in selected year" height={280}>
              <TrendChart data={data.trendData} activeWeek={week}/>
            </ChartBox>
            <div style={{background:'#fff',borderRadius:'var(--r-ppn)',border:'1px solid var(--border)',padding:'20px 24px'}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--muted)',marginBottom:16,textTransform:'uppercase',letterSpacing:'0.05em'}}>Week-by-week summary</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:'2px solid var(--border)'}}>
                      {['Week','BL','RP','Avg DR'].map(h=>(
                        <th key={h} style={{textAlign:h==='Week'?'left':'right',padding:'8px 12px',color:'var(--muted)',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...data.trendData].reverse().map((w,i)=>(
                      <tr key={w.week} style={{borderBottom:'1px solid var(--border)',background:String(w.week)===String(week)?'var(--ppn-light)':i%2===0?'transparent':'#FAFAFA'}}>
                        <td style={{padding:'9px 12px',fontWeight:String(w.week)===String(week)?700:400,color:String(w.week)===String(week)?'var(--ppn)':'var(--text)'}}>W {w.week}</td>
                        <td style={{padding:'9px 12px',textAlign:'right',fontWeight:600}}>{w.bl}</td>
                        <td style={{padding:'9px 12px',textAlign:'right'}}>{w.rp}</td>
                        <td style={{padding:'9px 12px',textAlign:'right',color:'var(--muted)'}}>{w.avgDr}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
